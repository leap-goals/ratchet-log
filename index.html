<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratchet Log</title>
    <link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
    <style>
        :root { 
            --main-pink: #f7cfe1;    /* 指定のメインカラー */
            --light-pink: #fef4f8;   /* 背景用の淡いピンク */
            --deep-pink: #e0a3be;    /* アクセント */
            --text-dark: #5a5455;    /* 文字色 */
            --white: #ffffff;
        }

        body { 
            background-color: var(--light-pink); 
            color: var(--text-dark); 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; 
            padding: 20px; 
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            max-width: 500px; 
            margin: auto; 
            background: var(--white);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(247, 207, 225, 0.4);
        }

        h1 { 
            color: var(--deep-pink); 
            text-align: center; 
            letter-spacing: 0.2em; 
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .category { margin-top: 25px; }

        h3 { 
            background-color: var(--main-pink);
            color: var(--text-dark);
            padding: 5px 18px; 
            font-size: 0.85rem;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 10px;
        }

        .item { 
            display: flex; 
            align-items: center; 
            margin: 4px 0; 
            cursor: pointer; 
            padding: 8px 12px;
            border-radius: 10px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .item:hover { background-color: var(--main-pink); opacity: 0.8; }

        input[type="checkbox"] { 
            width: 18px; 
            height: 18px; 
            margin-right: 12px; 
            accent-color: var(--deep-pink); 
            cursor: pointer;
        }
        
        .export-section { 
            margin-top: 30px; 
            padding-top: 20px; 
        }

        textarea { 
            width: 100%; 
            height: 140px; 
            background: var(--light-pink); 
            color: var(--text-dark); 
            border: 1px solid var(--main-pink); 
            padding: 15px; 
            font-size: 0.9rem; 
            margin-top: 15px; 
            border-radius: 15px;
            box-sizing: border-box;
            outline: none;
            resize: none;
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--main-pink); 
            color: var(--text-dark); 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 10px 0; 
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        button:hover { 
            background: var(--deep-pink); 
            color: white;
            transform: translateY(-1px); 
        }

        .copy-btn { 
            background: var(--white); 
            color: var(--deep-pink); 
            border: 2px solid var(--main-pink);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>RATCHET LOG</h1>

    <div class="category">
        <h3>Beauty</h3>
        <label class="item"><input type="checkbox" value="肌艶がよい"> 肌艶がよい</label>
        <label class="item"><input type="checkbox" value="肌のキメが整ってる"> 肌のキメが整ってる</label>
        <label class="item"><input type="checkbox" value="お風呂上がりのような血色"> お風呂上がりのような血色</label>
        <label class="item"><input type="checkbox" value="肌の透明感が増した"> 肌の透明感が増した</label>
        <label class="item"><input type="checkbox" value="フェイスラインがスッキリした"> フェイスラインがスッキリした</label>
        <label class="item"><input type="checkbox" value="目の開きがよくなった"> 目の開きがよくなった</label>
        <label class="item"><input type="checkbox" value="白眼が澄んでいる"> 白眼が澄んでいる</label>
        <label class="item"><input type="checkbox" value="視界が明るい"> 視界が明るい</label>
        <label class="item"><input type="checkbox" value="肌がしっとりしている"> 肌がしっとりしている</label>
        <label class="item"><input type="checkbox" value="トーンアップした"> トーンアップした</label>
        <label class="item"><input type="checkbox" value="シミが薄くなった"> シミが薄くなった</label>
        <label class="item"><input type="checkbox" value="毛穴が目立たなくなった"> 毛穴が目立たなくなった</label>
        <label class="item"><input type="checkbox" value="鼻筋が通って、高くなった"> 鼻筋が通って、高くなった</label>
        <label class="item"><input type="checkbox" value="小皺が目立たなくなった"> 小皺が目立たなくなった</label>
        <label class="item"><input type="checkbox" value="唇が潤ってる"> 唇が潤ってる</label>
        <label class="item"><input type="checkbox" value="唇の血色がよい"> 唇の血色がよい</label>
        <label class="item"><input type="checkbox" value="髪の毛がしっとりしている"> 髪の毛がしっとりしている</label>
     

    <div class="category">
        <h3>Body</h3>
        <label class="item"><input type="checkbox" value="首が長くなった"> 首が長くなった</label>
        <label class="item"><input type="checkbox" value="首の可動域が広がった"> 首の可動域が広がった</label>
        <label class="item"><input type="checkbox" value="ウエストにくびれが出てきた"> ウエストにくびれが出てきた</label>
        <label class="item"><input type="checkbox" value="呼吸が深くなった"> 呼吸が深くなった</label>
        <label class="item"><input type="checkbox" value="前屈が深くなった"> 前屈が深くなった</label>
        <label class="item"><input type="checkbox" value="背骨が真っ直ぐ整った感覚がある"> 背骨が真っ直ぐ整った感覚がある</label>
        <label class="item"><input type="checkbox" value="肩甲骨が下がった"> 肩甲骨が下がった</label>
        <label class="item"><input type="checkbox" value="全身がゆるんで、心地よい"> 全身がゆるんで、心地よい</label>
        <label class="item"><input type="checkbox" value="首や肩のコリが解消した"> 首や肩のコリが解消した</label>
        <label class="item"><input type="checkbox" value="身体が温かい"> 身体が温かい</label>
        <label class="item"><input type="checkbox" value="目覚めがスッキリしている"> 目覚めがスッキリしている</label>
        <label class="item"><input type="checkbox" value="疲れにくくなった"> 疲れにくくなった</label>
        <label class="item"><input type="checkbox" value="眠りが深くなった"> 眠りが深くなった</label>
        <label class="item"><input type="checkbox" value="お通じがよい"> お通じがよい</label>
        <label class="item"><input type="checkbox" value="リカバリーが早くなった"> リカバリーが早くなった</label>
        <label class="item"><input type="checkbox" value="五感が鋭くなった"> 五感が鋭くなった</label>
        <label class="item"><input type="checkbox" value="声の倍音成分が増えた"> 声の倍音成分が増えた</label>
    </div>
    
    <div class="category">
    <h3>Mind</h3>
    <label class="item"><input type="checkbox" value="気分が明るくなった"> 気分が明るくなった</label>
    <label class="item"><input type="checkbox" value="エフィカシーが高まった"> エフィカシーが高まった</label>
    <label class="item"><input type="checkbox" value="思考がクリアで軽やか"> 思考がクリアで軽やか</label>
    <label class="item"><input type="checkbox" value="セルフトークがポジティブ"> セルフトークがポジティブ</label>
    <label class="item"><input type="checkbox" value="オラクルをキャッチしやすくなった"> オラクルをキャッチしやすくなった</label>
    <label class="item"><input type="checkbox" value="難しい本が読めるようになった"> 難しい本が読めるようになった</label>
    <label class="item"><input type="checkbox" value="心が穏やかで静か"> 心が穏やかで静か</label>
    <label class="item"><input type="checkbox" value="不快な記憶で情動が乱れなくなった"> 不快な記憶で情動が乱れなくなった</label>
</div>


    <div class="export-section">
        <button onclick="exportLog()">観測</button>
        <textarea id="output" readonly placeholder="フィードバックがここに表示されます..."></textarea>
        <button class="copy-btn" onclick="copyLog()">コピーする</button>
    </div>
</div>

<script>
    function exportLog() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
        const now = new Date();
        const dateString = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
        
        let logText = `【Ratchet Log】 ${dateString}\n`;
        logText += `----------------------------\n`;
        
        if (checkboxes.length === 0) {
            logText += "待機中";
        } else {
            checkboxes.forEach((cb) => {
                logText += `・${cb.value}\n`;
            });
        }
        
        logText += `----------------------------`;

        document.getElementById('output').value = logText;
    }

    function copyLog() {
        const output = document.getElementById('output');
        if (!output.value) return;
        output.select();
        document.execCommand('copy');
        alert('コピーしました！');
    }
</script>

</body>
</html>
